# ==============================================================
# 선박 도장 품질 결함 탐지 - YOLO26m 대조군 학습 설정 (RTX 3090 전용)
# ==============================================================
# 💡 [실행 가이드] 
# 1. 학습 스크립트 실행
# !python scripts/train.py --config configs/model_yolo26m.yaml
# ==============================================================

# 1. 모델 설정
model_path: "yolo26m.pt"    # YOLO26m 공식 가중치 로드

# 2. 데이터셋 경로 (구글 드라이브 경로 기준)
# 🚨 로컬(../data/..)이 아닌 코랩 드라이브 절대경로로 지정하는 것이 안전합니다.
data: "/data/ship_paint_data.yaml"

# 3. 하드웨어 및 리소스 설정 (⚡ RTX 3090 극한 최적화)
device: 0                   # 사용할 GPU 번호 (RTX 3090)
batch: 32                  # RTX 3090의 VRAM 24GB를 최대한 활용하는 배치 사이즈
workers: 4                  # Ryzen 5600X 6코어 12스레드 CPU 기준 멀티프로세싱 코어 수에서 2뺀 값
cache: false                # 데이터셋 전체 크기가 램 용량을 넘어가면 False로 설정하세요

# 4. 학습 하이퍼파라미터
imgsz: 640                  # 동등 비교를 위해 640 유지
epochs: 100                 
#patience: 20                
#dropout: 0.15               

# 5. 부가 기능
val: True                   
plots: True